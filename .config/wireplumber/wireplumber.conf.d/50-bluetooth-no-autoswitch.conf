# Keep Bluetooth headsets (AirPods) in high-fidelity A2DP at all times.
#
# By default WirePlumber auto-switches a headset to the HFP/HSP profile the
# moment any app wants to record — which on AirPods means classic A2DP audio
# (stereo, AAC) collapses to mono "telephone" quality for the whole call.
# AirPods can't do hi-fi output and mic at the same time over classic Bluetooth
# (that's an Apple-proprietary trick, not exposed to Linux), so we choose hi-fi:
# the AirPods stay in A2DP and the laptop mic is used for calls instead.
#
# The mic can still be enabled on demand with the toggle key (Super+Alt+M ->
# scripts/airpods-mic.sh), which switches the card to headset-head-unit
# manually. Setting this false also stops the AirPods mic source from appearing.
wireplumber.settings = {
  bluetooth.autoswitch-to-headset-profile = false
}
