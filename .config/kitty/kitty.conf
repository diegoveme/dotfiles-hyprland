# kitty — terminal (nerd font + Snazzy theme)

# --- Font ---
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# --- Window ---
background_opacity     0.88
window_padding_width   8
hide_window_decorations yes
confirm_os_window_close 0
cursor_blink_interval  0.5
scrollback_lines       10000
enable_audio_bell      no

# --- Tabs ---
tab_bar_edge           bottom
tab_bar_style          powerline
tab_powerline_style    slanted

# --- Snazzy theme ---
foreground            #eff0eb
background            #282a36
selection_foreground  none
selection_background  #3e404a
cursor                #97979b
cursor_text_color     #282a36
url_color             #9aedfe

# normal
color0  #282a36
color1  #ff5c57
color2  #5af78e
color3  #f3f99d
color4  #57c7ff
color5  #ff6ac1
color6  #9aedfe
color7  #eeeeee
# bright
color8  #2a2a2a
color9  #ff0000
color10 #00ff00
color11 #eeff00
color12 #003cff
color13 #ff00ff
color14 #00ffff
color15 #ffffff
