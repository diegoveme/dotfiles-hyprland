# hypridle — lock and screen off on inactivity

general {
    lock_cmd = pidof hyprlock || hyprlock          # avoids launching several hyprlock
    before_sleep_cmd = loginctl lock-session        # lock before suspending
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })'   # turn screen on when returning
}

# After 5 min: lock
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# After 6 min: turn off the screen
listener {
    timeout = 360
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({ action = "disable" })'
    on-resume = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })'
}
