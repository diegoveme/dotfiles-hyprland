# hyprlock — lock screen, Tokyo Night theme

general {
    hide_cursor = true
    grace = 0
    disable_loading_bar = false
}

background {
    monitor =
    path = ~/.config/hypr/current-wallpaper
    blur_passes = 3
    blur_size = 8
    color = rgba(26, 27, 38, 1.0)
}

# Large clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    font_size = 92
    font_family = JetBrainsMono Nerd Font
    color = rgba(192, 202, 245, 1.0)
    position = 0, 170
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %B %d')"
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    color = rgba(122, 162, 247, 1.0)
    position = 0, 80
    halign = center
    valign = center
}

# User
label {
    monitor =
    text =   $USER
    font_size = 15
    font_family = JetBrainsMono Nerd Font
    color = rgba(86, 95, 137, 1.0)
    position = 0, 45
    halign = center
    valign = center
}

# Password field
input-field {
    monitor =
    size = 300, 55
    outline_thickness = 2
    dots_size = 0.4
    dots_spacing = 0.3
    dots_center = true
    dots_text_format = ♡
    outer_color = rgba(122, 162, 247, 1.0)
    inner_color = rgba(36, 40, 59, 1.0)
    font_color = rgba(192, 202, 245, 1.0)
    placeholder_text = <span foreground="##565f89">Password…</span>
    fail_color = rgba(247, 118, 142, 1.0)
    fail_text = <i>Wrong ($ATTEMPTS)</i>
    check_color = rgba(158, 206, 106, 1.0)
    position = 0, -40
    halign = center
    valign = center
}
